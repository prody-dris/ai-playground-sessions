<style>
.thanks-card {
  background: linear-gradient(135deg, rgba(46,139,87,0.06), rgba(46,139,87,0.01));
  border: 1px solid rgba(46,139,87,0.3);
  border-left: 4px solid #2e8b57;
  border-radius: 14px;
  padding: 44px 36px 40px;
  margin: 40px 0 20px;
  text-align: center;
}
.thanks-eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: #2e8b57;
  margin-bottom: 14px;
}
.thanks-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 42px;
  font-weight: 600;
  color: var(--primary);
  line-height: 1.1;
  letter-spacing: -0.7px;
  margin: 0 0 16px;
}
.thanks-body {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text-mid);
  max-width: 560px;
  margin: 0 auto 22px;
}
.thanks-ctas {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.thanks-btn {
  display: inline-block;
  padding: 12px 22px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-decoration: none;
  transition: transform 0.15s, box-shadow 0.15s;
}
.thanks-btn.primary { background: var(--accent); color: #fff; }
.thanks-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(216,93,42,0.3); }
.thanks-btn.secondary { background: transparent; color: var(--primary); border: 1px solid var(--rule); }
.thanks-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }
@media (max-width: 640px) {
  .thanks-card { padding: 32px 24px 28px; }
  .thanks-title { font-size: 32px; }
}
</style>
</head>
<body>

<div class="mobile-header">
  <img src="../assets/images/dhwani-logo.png?v=2" alt="Dhwani">
  <span>AI Playground</span>
  <button class="hamburger" onclick="document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('open');">&#9776;</button>
</div>
<div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('open');this.classList.remove('open');"></div>

<aside class="sidebar" data-sidebar="subfolder"></aside>

<div class="main"><div class="content">

<div class="thanks-card">
  <div class="thanks-eyebrow">Checked in</div>
  <h1 class="thanks-title">Locked in.</h1>
  <p class="thanks-body">
    Your check-in has been logged. Nihaan will loop you in on what comes next. In the meantime &mdash; see you Thursday. Bring a problem.
  </p>
  <div class="thanks-ctas">
    <a href="../sessions/session-6.html" class="thanks-btn primary">Re-read the S6 recap</a>
    <a href="how-we-play.html" class="thanks-btn secondary">How we play now</a>
  </div>
</div>

<div class="main-footer">
  <div><a href="../index.html">&larr; Home</a></div>
  <small>Dhwani RIS &middot; AI Playground &middot; 2026</small>
</div>

</div></div>
